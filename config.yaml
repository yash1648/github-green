# GitHubGreenCard Configuration
# ==============================
# All pipeline settings in one place.

pipeline:
  # Target programming language for solutions
  language: "java"
  # Output root directory under repo
  output_root: "LeetCode"
  # Max solutions to generate per run (1-10; configurable via MAX_COMMITS env var)
  max_commits_per_run: 5

ingestion:
  leetcode:
    # alfa-leetcode-api REST endpoint (no auth needed)
    api_url: "https://alfa-leetcode-api.onrender.com"
    # Request timeout in seconds
    timeout: 30
    # How many problems to fetch per page when picking randomly
    page_size: 50
  backlog:
    # Path to local backlog JSON file
    file_path: "backlog.json"

execution:
  llm:
    # NVIDIA NIM (OpenAI-compatible) — free tier: 1,000 inference credits, 40 req/min
    # Sign up at https://build.nvidia.com to get an nvapi- key
    # Set NVIDIA_API_KEY (or OPENAI_API_KEY) env var
    base_url: "https://integrate.api.nvidia.com/v1"

    # Model for Stage 1 (code generation) — heavy model for best quality
    model_code: "meta/llama-3.1-70b-instruct"
    # Model for Stage 2 (documentation) — lighter model for creative writing
    model_doc: "nvidia/nemotron-mini-4b-instruct"

    temperature_code: 0.2   # Low temp for deterministic code
    temperature_doc: 0.7    # Higher temp for creative docs
    max_tokens_code: 4096
    max_tokens_doc: 1500
    retry_count: 3
    retry_delay: 5  # seconds

repository:
  git:
    # Branch to push to
    branch: "main"
    # Author name for commits
    author_name: "GitHubGreenCard Bot"
    # Author email for commits
    author_email: "bot@githubgreencard.dev"

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
